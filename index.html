<!DOCTYPE html>
<html>
<head>
  <title>Online Exam</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }
    .box { background:white; padding:20px; border-radius:10px; max-width:600px; margin:auto; }
    button { padding:10px 20px; background:green; color:white; border:none; border-radius:5px; }
  </style>
</head>

<body>

<div class="box">
<h2>Online Test</h2>

<label>Student Name:</label><br>
<input type="text" id="studentName"><br><br>

<button onclick="startExam()">Start Exam</button>

<p id="timer"></p>

<form id="quizForm" style="display:none;">

<p>1. What is 2 + 2?</p>
<input type="radio" name="q1" value="3"> 3<br>
<input type="radio" name="q1" value="4"> 4<br>
<input type="radio" name="q1" value="5"> 5<br>

<p>2. HTML stands for?</p>
<input type="radio" name="q2" value="wrong"> Hyper Trainer Marking Language<br>
<input type="radio" name="q2" value="correct"> Hyper Text Markup Language<br>

<p>3. Which is a programming language?</p>
<input type="radio" name="q3" value="html"> HTML<br>
<input type="radio" name="q3" value="python"> Python<br><br>

<button type="button" onclick="submitQuiz()">Submit</button>

</form>

<h3 id="result"></h3>
</div>

<script>

let timeLeft = 60;
let timer;

// START EXAM
function startExam() {
  let name = document.getElementById("studentName").value;

  if(name == "") {
    alert("Enter your name first");
    return;
  }

  document.getElementById("quizForm").style.display = "block";

  timer = setInterval(function() {
    document.getElementById("timer").innerText = "Time Left: " + timeLeft + " sec";
    timeLeft--;

    if(timeLeft < 0) {
      clearInterval(timer);
      submitQuiz();
    }
  }, 1000);
}

// SUBMIT
function submitQuiz() {
  clearInterval(timer);

  let name = document.getElementById("studentName").value;
  let score = 0;

  let q1 = document.querySelector('input[name="q1"]:checked');
  let q2 = document.querySelector('input[name="q2"]:checked');
  let q3 = document.querySelector('input[name="q3"]:checked');

  if (q1 && q1.value == "4") score++;
  if (q2 && q2.value == "correct") score++;
  if (q3 && q3.value == "python") score++;

  document.getElementById("result").innerHTML =
    "Name: " + name + "<br>Your Score: " + score + "/3";
}

</script>

</body>
</html>
